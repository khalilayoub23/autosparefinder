name: Aftermarket Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve tunnel parameters
        env:
          CATALOG_DB_URL: ${{ secrets.CATALOG_DB_URL }}
          SSH_HOST_SECRET: ${{ secrets.SSH_HOST }}
          VPS_HOST_SECRET: ${{ secrets.VPS_HOST }}
          DB_TUNNEL_TARGET_HOST_SECRET: ${{ secrets.DB_TUNNEL_TARGET_HOST }}
          DB_TUNNEL_TARGET_PORT_SECRET: ${{ secrets.DB_TUNNEL_TARGET_PORT }}
        run: |
          python - <<'PY'
          import os
          from urllib.parse import urlsplit

          db_url = os.environ.get("CATALOG_DB_URL", "").strip()
          if not db_url:
              raise SystemExit("CATALOG_DB_URL secret is required")

          parsed = urlsplit(db_url)
          if not parsed.scheme or not parsed.netloc:
              raise SystemExit("CATALOG_DB_URL must be a full postgres URL")

          ssh_host = ((os.environ.get("SSH_HOST_SECRET") or "").strip() or (os.environ.get("VPS_HOST_SECRET") or "").strip() or (parsed.hostname or "").strip())
          ssh_host = ssh_host.splitlines()[0].strip() if ssh_host else ""
          if not ssh_host:
              raise SystemExit("Missing SSH host: set SSH_HOST or VPS_HOST secret, or use a URL with hostname")

          tunnel_target_host = (os.environ.get("DB_TUNNEL_TARGET_HOST_SECRET") or "").strip() or "127.0.0.1"
          tunnel_target_host = tunnel_target_host.splitlines()[0].strip()
          tunnel_target_port = (os.environ.get("DB_TUNNEL_TARGET_PORT_SECRET") or "").strip() or str(parsed.port or 5432)
          tunnel_target_port = tunnel_target_port.splitlines()[0].strip()

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"SSH_TUNNEL_HOST={ssh_host}\n")
              fh.write(f"DB_TUNNEL_TARGET_HOST={tunnel_target_host}\n")
              fh.write(f"DB_TUNNEL_TARGET_PORT={tunnel_target_port}\n")
          PY

      - name: Resolve SSH private key secret
        env:
          SSH_PRIVATE_KEY_PRIMARY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY_ALT1: ${{ secrets.SSH_KEY }}
          SSH_PRIVATE_KEY_ALT2: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY_ALT3: ${{ secrets.VPS_SSH_KEY }}
        run: |
          key="${SSH_PRIVATE_KEY_PRIMARY:-}"
          if [ -z "$key" ]; then key="${SSH_PRIVATE_KEY_ALT1:-}"; fi
          if [ -z "$key" ]; then key="${SSH_PRIVATE_KEY_ALT2:-}"; fi
          if [ -z "$key" ]; then key="${SSH_PRIVATE_KEY_ALT3:-}"; fi
          if [ -z "$key" ]; then
            echo "::error::Missing SSH private key secret. Set one of: SSH_PRIVATE_KEY, SSH_KEY, HETZNER_SSH_PRIVATE_KEY, VPS_SSH_KEY"
            exit 1
          fi

          {
            echo "SCRAPER_SSH_PRIVATE_KEY<<EOF"
            echo "$key"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ env.SCRAPER_SSH_PRIVATE_KEY }}

      - name: Trust SSH host key
        env:
          SSH_PORT_PRIMARY: ${{ secrets.SSH_PORT }}
          SSH_PORT_ALT1: ${{ secrets.VPS_SSH_PORT }}
        run: |
          ssh_port="${SSH_PORT_PRIMARY:-${SSH_PORT_ALT1:-22}}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$ssh_port" -H "$SSH_TUNNEL_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Open SSH tunnel to catalog DB
        env:
          SSH_USER_PRIMARY: ${{ secrets.SSH_USER }}
          SSH_USER_ALT1: ${{ secrets.VPS_USER }}
          SSH_PORT_PRIMARY: ${{ secrets.SSH_PORT }}
          SSH_PORT_ALT1: ${{ secrets.VPS_SSH_PORT }}
        run: |
          ssh_user="${SSH_USER_PRIMARY:-}"
          if [ -z "$ssh_user" ]; then ssh_user="${SSH_USER_ALT1:-}"; fi
          if [ -z "$ssh_user" ]; then
            echo "::error::Missing SSH user secret. Set one of: SSH_USER, VPS_USER"
            exit 1
          fi

          ssh_port="${SSH_PORT_PRIMARY:-${SSH_PORT_ALT1:-22}}"

          ssh -f -N \
            -L 55432:${DB_TUNNEL_TARGET_HOST}:${DB_TUNNEL_TARGET_PORT} \
            -p "$ssh_port" \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            "$ssh_user@$SSH_TUNNEL_HOST"

          ss -ltn | grep '127.0.0.1:55432'

      - name: Install dependencies
        run: |
          pip install playwright httpx asyncpg beautifulsoup4 lxml
          playwright install chromium --with-deps

      - name: Build tunneled DB URL
        env:
          CATALOG_DB_URL: ${{ secrets.CATALOG_DB_URL }}
        run: |
          python - <<'PY'
          import os
          from urllib.parse import parse_qsl, urlencode, urlsplit, urlunsplit

          db_url = os.environ.get("CATALOG_DB_URL", "").strip()
          parsed = urlsplit(db_url)
          if not parsed.scheme or not parsed.netloc:
              raise SystemExit("CATALOG_DB_URL must be a full postgres URL")

          userinfo = ""
          if "@" in parsed.netloc:
              userinfo = parsed.netloc.rsplit("@", 1)[0] + "@"

          params = [(k, v) for k, v in parse_qsl(parsed.query, keep_blank_values=True) if k.lower() != "sslmode"]
          params.append(("sslmode", "disable"))

          tunneled = urlunsplit(
              (parsed.scheme, f"{userinfo}127.0.0.1:55432", parsed.path, urlencode(params), parsed.fragment)
          )

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as fh:
              fh.write(f"TUNNELED_CATALOG_DB_URL={tunneled}\n")
          PY

      - name: Preflight catalog DB connection
        env:
          CATALOG_DB_URL: ${{ env.TUNNELED_CATALOG_DB_URL }}
        run: |
          python - <<'PY'
          import asyncio
          import os
          import asyncpg

          async def main() -> None:
              conn = await asyncpg.connect(os.environ["CATALOG_DB_URL"], timeout=20)
              row = await conn.fetchrow("SELECT inet_server_addr()::text AS host, inet_server_port() AS port, now() AS ts")
              print(f"preflight_ok host={row['host']} port={row['port']} ts={row['ts']}")
              await conn.close()

          asyncio.run(main())
          PY

      - name: Run aftermarket scraper
        env:
          CATALOG_DB_URL: ${{ env.TUNNELED_CATALOG_DB_URL }}
        run: python scripts/scraper_gh_actions.py
