version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: autospare_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autospare
      POSTGRES_USER: autospare
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autospare"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: autospare_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: autospare_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://autospare:${DB_PASSWORD}@postgres:5432/autospare
      DATABASE_PII_URL: postgresql+asyncpg://autospare:${DB_PASSWORD}@postgres:5432/autospare_pii
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}  # kept for any legacy integrations — remove once fully migrated
      OLLAMA_URL: ${OLLAMA_URL}       # e.g. http://VPS_IP:11434
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      CLAMD_HOST: clamav
      MEILI_URL: ${MEILI_URL:-http://meilisearch:7700}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      ENVIRONMENT: production
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/system/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - upload_files:/app/uploads
    command: >
      sh -c "
        python -c 'import asyncio; from BACKEND_DATABASE_MODELS import create_tables; asyncio.run(create_tables())'
        && uvicorn BACKEND_API_ROUTES:app --host 0.0.0.0 --port 8000 --workers 4
      "

  frontend:
    build: ./frontend
    container_name: autospare_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  clamav:
    image: clamav/clamav:stable
    container_name: autospare_clamav
    restart: unless-stopped
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s

  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: autospare_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  upload_files:
  meili_data:
