server {
    listen 80;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Short payment links (added 2026-07-05): autosparefinder.co.il/pay/{code}
    # redirects to the full Stripe checkout URL — WhatsApp messages carry the
    # short branded link instead of a 120-char stripe.com URL.
    location /pay/ {
        proxy_pass http://backend:8000/api/v1/pay/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /aliexpress/ {
        proxy_pass http://backend:8000/api/suppliers/aliexpress/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/chat/ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
