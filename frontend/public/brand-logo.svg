<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 380" role="img" aria-label="AutoSpare logo">
<defs>
  <!-- Chrome metallic gradient — applied to ring and handle -->
  <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#F1F5F9"/>
    <stop offset="22%"  stop-color="#CBD5E1"/>
    <stop offset="45%"  stop-color="#475569"/>
    <stop offset="62%"  stop-color="#1E293B"/>
    <stop offset="80%"  stop-color="#64748B"/>
    <stop offset="100%" stop-color="#E2E8F0"/>
  </linearGradient>
  <!-- Secondary chrome for inner ring / spokes -->
  <linearGradient id="chrome2" x1="1" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#CBD5E1"/>
    <stop offset="40%"  stop-color="#334155"/>
    <stop offset="100%" stop-color="#94A3B8"/>
  </linearGradient>
  <!-- Inner circle — deep lens -->
  <radialGradient id="lens" cx="42%" cy="38%" r="56%">
    <stop offset="0%"   stop-color="#1E3A5F"/>
    <stop offset="55%"  stop-color="#0F1E35"/>
    <stop offset="100%" stop-color="#060A10"/>
  </radialGradient>
  <!-- Windshield tint -->
  <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#93C5FD" stop-opacity=".55"/>
    <stop offset="100%" stop-color="#1D4ED8" stop-opacity=".18"/>
  </linearGradient>
  <!-- Handle chrome -->
  <linearGradient id="hch" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#E2E8F0"/>
    <stop offset="35%"  stop-color="#64748B"/>
    <stop offset="65%"  stop-color="#1E293B"/>
    <stop offset="100%" stop-color="#CBD5E1"/>
  </linearGradient>
  <!-- Wordmark chrome -->
  <linearGradient id="wm" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#F1F5F9"/>
    <stop offset="30%"  stop-color="#CBD5E1"/>
    <stop offset="58%"  stop-color="#64748B"/>
    <stop offset="100%" stop-color="#E2E8F0"/>
  </linearGradient>
  <!-- Mask for spoke gaps -->
  <mask id="spokeMask">
    <rect width="340" height="380" fill="white"/>
    <!-- 6 gaps at 60° intervals centered at 170,185; ring outer r=128, width=22 -->
    <!-- Gaps are thin rectangles from r=100 to r=134 at each 60° angle -->
    <rect x="161" y="51" width="18" height="38" rx="2" fill="black" transform="rotate(0 170 185)"/>
    <rect x="161" y="51" width="18" height="38" rx="2" fill="black" transform="rotate(60 170 185)"/>
    <rect x="161" y="51" width="18" height="38" rx="2" fill="black" transform="rotate(120 170 185)"/>
    <rect x="161" y="51" width="18" height="38" rx="2" fill="black" transform="rotate(180 170 185)"/>
    <rect x="161" y="51" width="18" height="38" rx="2" fill="black" transform="rotate(240 170 185)"/>
    <rect x="161" y="51" width="18" height="38" rx="2" fill="black" transform="rotate(300 170 185)"/>
  </mask>
</defs>

<!-- ── GEAR RING ── -->
<!-- Outer chrome ring: r=128, stroke=22 gives outer edge r=139 inner r=117 -->
<circle cx="170" cy="185" r="128"
  fill="none"
  stroke="url(#chrome)"
  stroke-width="22"
  mask="url(#spokeMask)"/>

<!-- Inner concentric rings (logo DNA: concentric circle elements) -->
<circle cx="170" cy="185" r="106" fill="none" stroke="url(#chrome2)" stroke-width="3.5" opacity=".7"/>
<circle cx="170" cy="185" r="96"  fill="none" stroke="url(#chrome2)" stroke-width="1.5" opacity=".38"/>

<!-- Ring inner fill — dark lens -->
<circle cx="170" cy="185" r="116" fill="url(#lens)"/>

<!-- ── CAR SILHOUETTE ── -->
<!-- Body — classic sedan, centered at 170,200 -->
<path d="
  M 85,218
  L 85,197
  L 108,172
  L 142,161
  L 196,161
  L 226,175
  L 255,197
  L 255,218
  Z"
  fill="none"
  stroke="url(#chrome2)"
  stroke-width="2.5"
  stroke-linejoin="round"
  opacity=".85"/>

<!-- Roof / cabin -->
<path d="
  M 108,172
  L 123,155
  L 155,147
  L 192,147
  L 213,158
  L 226,175"
  fill="none"
  stroke="url(#chrome2)"
  stroke-width="2.5"
  stroke-linecap="round"
  opacity=".85"/>

<!-- Windshield -->
<path d="M 123,155 L 113,170 L 148,175 L 148,151 Z"
  fill="url(#glass)" stroke="#60A5FA" stroke-width="1.2" stroke-linejoin="round" opacity=".7"/>

<!-- Rear window -->
<path d="M 196,147 L 213,158 L 210,172 L 190,172 Z"
  fill="url(#glass)" stroke="#60A5FA" stroke-width="1.2" stroke-linejoin="round" opacity=".45"/>

<!-- Door line -->
<line x1="155" y1="147" x2="157" y2="218"
  stroke="#334155" stroke-width="1.5" stroke-dasharray="none" opacity=".45"/>

<!-- Front headlight DRL -->
<rect x="238" y="188" width="18" height="5" rx="2.5"
  fill="#93C5FD" opacity=".6"/>

<!-- Front headlight -->
<ellipse cx="248" cy="198" rx="10" ry="6"
  fill="#BFDBFE" opacity=".4"/>

<!-- Grille -->
<rect x="245" y="202" width="14" height="10" rx="1.5"
  fill="none" stroke="#475569" stroke-width="1.2" opacity=".5"/>

<!-- Wheels -->
<circle cx="122" cy="218" r="22" fill="none" stroke="url(#chrome2)" stroke-width="3" opacity=".9"/>
<circle cx="122" cy="218" r="11" fill="none" stroke="url(#chrome2)" stroke-width="1.5" opacity=".5"/>
<circle cx="122" cy="218" r="4"  fill="#334155" opacity=".7"/>
<!-- Wheel spokes -->
<line x1="122" y1="218" x2="122" y2="207" stroke="#475569" stroke-width="1.5" opacity=".55"/>
<line x1="122" y1="218" x2="122" y2="229" stroke="#475569" stroke-width="1.5" opacity=".55"/>
<line x1="122" y1="218" x2="111" y2="218" stroke="#475569" stroke-width="1.5" opacity=".55"/>
<line x1="122" y1="218" x2="133" y2="218" stroke="#475569" stroke-width="1.5" opacity=".55"/>

<circle cx="219" cy="218" r="22" fill="none" stroke="url(#chrome2)" stroke-width="3" opacity=".9"/>
<circle cx="219" cy="218" r="11" fill="none" stroke="url(#chrome2)" stroke-width="1.5" opacity=".5"/>
<circle cx="219" cy="218" r="4"  fill="#334155" opacity=".7"/>
<line x1="219" y1="218" x2="219" y2="207" stroke="#475569" stroke-width="1.5" opacity=".55"/>
<line x1="219" y1="218" x2="219" y2="229" stroke="#475569" stroke-width="1.5" opacity=".55"/>
<line x1="219" y1="218" x2="208" y2="218" stroke="#475569" stroke-width="1.5" opacity=".55"/>
<line x1="219" y1="218" x2="230" y2="218" stroke="#475569" stroke-width="1.5" opacity=".55"/>

<!-- ── MAGNIFYING GLASS at 135° ── -->
<!-- 135° from top = bottom-right direction. Position: on ring outer edge -->
<!-- Center: 170 + sin(135°)*128 = 170 + 90.5 = 260.5, 185 + cos(135°+180°)*128 -->
<!-- 135° measured clockwise from top: sin(135°)=0.707, -cos(135°)=0.707 -->
<!-- Point on ring: 170 + 0.707*128 ≈ 260, 185 + 0.707*128 ≈ 275 -->
<!-- Handle goes from ring edge outward in the 135° direction -->
<line x1="255" y1="268" x2="298" y2="311"
  stroke="url(#hch)"
  stroke-width="18"
  stroke-linecap="round"/>
<!-- Handle cap -->
<circle cx="302" cy="315" r="9"
  fill="#1E293B"
  stroke="url(#chrome)"
  stroke-width="2"/>

<!-- Magnifying glass circle (the search lens element) -->
<circle cx="244" cy="258" r="28"
  fill="none"
  stroke="url(#chrome)"
  stroke-width="9"/>
<circle cx="244" cy="258" r="19"
  fill="url(#lens)"
  opacity=".85"/>
<!-- Cross-hairs inside lens -->
<line x1="244" y1="246" x2="244" y2="270" stroke="#334155" stroke-width="1.2" opacity=".45"/>
<line x1="232" y1="258" x2="256" y2="258" stroke="#334155" stroke-width="1.2" opacity=".45"/>

<!-- ── WORDMARK ── -->
<text x="170" y="317"
  text-anchor="middle"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="46"
  font-weight="900"
  font-style="italic"
  letter-spacing="-1.5"
  fill="url(#wm)">AutoSpare</text>

<!-- Subtitle bar -->
<rect x="88" y="328" width="164" height="22" rx="4"
  fill="none"
  stroke="url(#chrome2)"
  stroke-width="1"
  opacity=".35"/>
<text x="170" y="344"
  text-anchor="middle"
  font-family="'Helvetica Neue', Arial, sans-serif"
  font-size="11"
  font-weight="700"
  letter-spacing="5"
  fill="#94A3B8"
  opacity=".8">SPARE FINDER</text>
</svg>
