  <rect x="132" y="154" width="122" height="42" rx="18" fill="#f0f6ff"/>
  <circle cx="177" cy="214" r="24" fill="#f0f6ff"/>
  <circle cx="338" cy="214" r="24" fill="#f0f6ff"/>
  <circle cx="177" cy="214" r="11" fill="#1f3f6b"/>
  <circle cx="338" cy="214" r="11" fill="#1f3f6b"/>

  <circle cx="355" cy="240" r="33" fill="none" stroke="url(#ring)" stroke-width="12"/>
