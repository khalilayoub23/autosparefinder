<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="AutoSpare Spare Finder logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f3a"/>
      <stop offset="100%" stop-color="#1f3f6b"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dce7f5"/>
      <stop offset="100%" stop-color="#9cb4d3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1ca7ff"/>
      <stop offset="100%" stop-color="#37c3ff"/>
    </linearGradient>
  </defs>

  <g transform="translate(20 20)">
    <rect width="280" height="280" rx="30" fill="url(#bg)"/>

    <circle cx="140" cy="100" r="72" fill="none" stroke="url(#ring)" stroke-width="10"/>
    <circle cx="140" cy="100" r="56" fill="none" stroke="#263b57" stroke-width="11"/>
    <circle cx="140" cy="100" r="40" fill="none" stroke="url(#accent)" stroke-width="11"/>

    <rect x="62" y="88" width="155" height="20" rx="10" fill="#f0f6ff"/>
    <rect x="72" y="79" width="66" height="24" rx="10" fill="#f0f6ff"/>
    <circle cx="97" cy="113" r="13" fill="#f0f6ff"/>
    <circle cx="184" cy="113" r="13" fill="#f0f6ff"/>
    <circle cx="97" cy="113" r="6" fill="#1f3f6b"/>
    <circle cx="184" cy="113" r="6" fill="#1f3f6b"/>

    <circle cx="192" cy="128" r="18" fill="none" stroke="url(#ring)" stroke-width="6"/>
    <rect x="204" y="139" width="24" height="7" rx="3.5" transform="rotate(36 204 139)" fill="url(#ring)"/>
  </g>

  <text x="340" y="140" font-size="102" font-family="Segoe UI, Arial, sans-serif" font-weight="800" fill="#102744">AutoSpare</text>
  <rect x="344" y="170" width="610" height="74" rx="14" fill="url(#accent)"/>
  <text x="649" y="220" text-anchor="middle" font-size="44" letter-spacing="7" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#f7fbff">SPARE FINDER</text>
</svg>
